version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: brokerage_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: brokerage
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d brokerage"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl:
    build: .
    container_name: brokerage_etl
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    environment:
      - DB_HOST=db
      - DB_PORT=5432       
      - DB_USER=user
      - DB_PASS=password
      - DB_NAME=brokerage 

volumes:
  postgres_data: